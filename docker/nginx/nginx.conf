events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # 1. DevLock Web Dashboard
    server {
        listen 80;
        server_name devlock.tashanto.com;

        location / {
            # Proxying to local port 4000 where web-dashboard is mapped
            proxy_pass http://127.0.0.1:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. DevLock API Gateway
    server {
        listen 80;
        server_name dl-api.tashanto.com;

        location / {
            # Proxying to local port 3001 where api-gateway is mapped
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. DevLock WebSocket Service
    server {
        listen 80;
        server_name dl-ws.tashanto.com;

        location / {
            # Proxying to local port 3010 where websocket-service is mapped
            proxy_pass http://127.0.0.1:3010;
            
            # Important headers for WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
