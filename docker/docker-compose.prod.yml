version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: devlock-mongo
    restart: always
    volumes: ['mongo_data:/data/db']
    command: ['--replSet', 'rs0', '--bind_ip_all']
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devlock-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: ['redis_data:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: devlock-api
    restart: always
    # Mapping to 3001 on the host to avoid conflicting with your existing Next.js app on 3000
    ports: ['3001:3000']
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/devlock?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }

  auth-service:
    build:
      context: ..
      dockerfile: apps/auth-service/Dockerfile
    container_name: devlock-auth
    restart: always
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/devlock?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }

  license-service:
    build:
      context: ..
      dockerfile: apps/license-service/Dockerfile
    container_name: devlock-license
    restart: always
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/devlock?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }

  websocket-service:
    build:
      context: ..
      dockerfile: apps/websocket-service/Dockerfile
    container_name: devlock-ws
    restart: always
    ports: ['3010:3010']
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3010
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  web-dashboard:
    build:
      context: ..
      dockerfile: apps/web-dashboard/Dockerfile
    container_name: devlock-dashboard
    restart: always
    ports: ['4000:4000']
    env_file: ../.env
    environment:
      - NODE_ENV=production
    depends_on: [api-gateway]

volumes:
  mongo_data:
  redis_data:
