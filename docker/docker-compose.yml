version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: devlock-mongo
    volumes: ['./volumes/mongo:/data/db']
    command: ['--port', '27018', '--replSet', 'rs0', '--bind_ip_all']
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--port',
          '27018',
          '--eval',
          "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27018'}]}).ok }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devlock-redis
    command: redis-server --port 6380 --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: ['./volumes/redis:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6380', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: devlock-backend
    ports: ['6000:6000']
    env_file: ../.env
    environment:
      - PORT=6000
      - MONGODB_URI=mongodb://mongodb:27018/devlock?replicaSet=rs0
      - REDIS_URL=redis://redis:6380
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: devlock-frontend
    ports: ['6001:6001']
    env_file: ../.env
    depends_on: [backend]

volumes:
  mongo_data:
  redis_data:
